<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تسجيل الدخول - متجر خالد</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#d8e3fb",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c3c6d7",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-surface-variant": "#434655",
                        "tertiary-container": "#bc4800",
                        "on-secondary-fixed": "#111c2d",
                        "on-background": "#191b23",
                        "on-secondary-fixed-variant": "#3c475a",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "tertiary": "#943700",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f0fb",
                        "surface-container-high": "#e7e7f3",
                        "surface": "#faf8ff",
                        "primary-container": "#2563eb",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-dim": "#d9d9e5",
                        "surface-container": "#ededf9",
                        "secondary-container": "#d5e0f8",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "inverse-surface": "#2e3039",
                        "surface-container-lowest": "#ffffff",
                        "background": "#faf8ff",
                        "secondary-fixed-dim": "#bcc7de",
                        "on-tertiary-container": "#ffede6",
                        "surface-variant": "#e1e2ed",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-secondary-container": "#586377",
                        "on-primary-container": "#eeefff",
                        "on-primary-fixed": "#00174b",
                        "tertiary-fixed": "#ffdbcd",
                        "on-tertiary-fixed": "#360f00",
                        "surface-container-low": "#f3f3fe",
                        "primary-fixed": "#dbe1ff",
                        "primary": "#004ac6",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e1e2ed",
                        "surface-tint": "#0053db",
                        "surface-bright": "#faf8ff",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-surface": "#191b23",
                        "secondary": "#545f73",
                        "outline": "#737686"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline-sm": ["IBM Plex Sans"],
                        "headline-md": ["IBM Plex Sans"],
                        "title-lg": ["IBM Plex Sans"],
                        "body-md": ["IBM Plex Sans"],
                        "label-md": ["IBM Plex Sans"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["13px", {"lineHeight": "18px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-effect:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-[16px] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden animate-in fade-in zoom-in duration-500">
<div class="p-10">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary-container/10 rounded-xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-[48px] text-primary-container" data-icon="storefront">storefront</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">تسجيل الدخول للمدير</h1>
<p class="text-on-surface-variant font-body-md text-body-md mt-2">مرحباً بك مجدداً في لوحة تحكم متجر خالد</p>
</div>
<!-- Login Form -->
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant" for="email">البريد الإلكتروني</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md input-focus-effect transition-all duration-200" id="email" name="email" placeholder="admin@store.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">كلمة المرور</label>
<a class="text-primary-container font-label-md text-label-md hover:underline flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="lock_reset">lock_reset</span>
                            نسيت كلمة المرور؟
                        </a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md input-focus-effect transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<input class="w-5 h-5 rounded border-outline-variant text-primary-container focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">تذكرني</label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary-container text-on-primary font-headline-sm text-headline-sm rounded-lg hover:bg-primary transition-colors active:scale-[0.98] duration-150 flex items-center justify-center gap-2" type="submit">
<span>تسجيل الدخول</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<!-- Bottom Illustration/Decoration (Optional visual weight) -->
<div class="mt-10 pt-6 border-t border-outline-variant flex justify-center items-center gap-4 text-outline">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
<span class="font-label-md text-label-md">دخول آمن ومشفر 256-بت</span>
</div>
</div>
</main>
<!-- Floating Background Elements for atmospheric effect -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[10%] right-[15%] w-64 h-64 bg-primary-container/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[10%] left-[15%] w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl"></div>
</div>
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Interaction feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                // In a real app, this would be the redirect
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('جاري التحقق من البيانات...');
            }, 1000);
        });
    </script>
</body></html>
