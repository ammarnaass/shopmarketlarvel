services:
  mysql:
    image: mysql:8.0
    container_name: amar-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_2026
      MYSQL_DATABASE: amar_store
      MYSQL_USER: amar
      MYSQL_PASSWORD: amar_pass_2026
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

volumes:
  mysql_data:
