services:
  mariadb:
    image: mariadb:11.4
    container_name: amar-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_pass_2026
      MARIADB_DATABASE: amar_store
      MARIADB_USER: amar
      MARIADB_PASSWORD: amar_pass_2026
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: amar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
  redis_data:
